<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="round">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="1" cy="1" r="0.4" fill="#000" opacity="0.08"/>
      <circle cx="3" cy="2.5" r="0.3" fill="#fff" opacity="0.05"/>
    </pattern>
  </defs>

  <g clip-path="url(#round)">
    <!-- Sky -->
    <rect width="512" height="512" fill="#1F2C6B"/>

    <!-- Sun -->
    <circle cx="256" cy="200" r="78" fill="#FFD000"/>
    <!-- Sun rays (retro) -->
    <g stroke="#FFD000" stroke-width="10" stroke-linecap="round">
      <line x1="256" y1="80" x2="256" y2="110"/>
      <line x1="140" y1="200" x2="170" y2="200"/>
      <line x1="342" y1="200" x2="372" y2="200"/>
      <line x1="170" y1="115" x2="190" y2="135"/>
      <line x1="342" y1="115" x2="322" y2="135"/>
    </g>

    <!-- Horizon green field -->
    <path d="M0 290 L512 290 L512 512 L0 512 Z" fill="#1B8F3A"/>

    <!-- Street perspective -->
    <path d="M156 290 L356 290 L460 512 L52 512 Z" fill="#2A2F3A" stroke="#0F1226" stroke-width="6"/>

    <!-- Street dashed center line -->
    <g fill="#FFD000">
      <polygon points="252,300 260,300 262,328 250,328"/>
      <polygon points="247,360 265,360 268,398 244,398"/>
      <polygon points="240,440 272,440 278,500 234,500"/>
    </g>

    <!-- Curb highlights -->
    <line x1="156" y1="290" x2="52" y2="512" stroke="#FFFFFF" stroke-width="4" opacity="0.25"/>
    <line x1="356" y1="290" x2="460" y2="512" stroke="#FFFFFF" stroke-width="4" opacity="0.25"/>

    <!-- Buildings silhouette -->
    <g fill="#0F1226">
      <rect x="0" y="230" width="60" height="60"/>
      <rect x="60" y="210" width="40" height="80"/>
      <rect x="100" y="245" width="56" height="45"/>
      <rect x="356" y="240" width="50" height="50"/>
      <rect x="406" y="215" width="44" height="75"/>
      <rect x="450" y="235" width="62" height="55"/>
    </g>
    <!-- Building windows -->
    <g fill="#FFD000" opacity="0.85">
      <rect x="70" y="225" width="8" height="10"/>
      <rect x="85" y="225" width="8" height="10"/>
      <rect x="70" y="250" width="8" height="10"/>
      <rect x="85" y="250" width="8" height="10"/>
      <rect x="415" y="230" width="8" height="10"/>
      <rect x="430" y="230" width="8" height="10"/>
      <rect x="415" y="255" width="8" height="10"/>
      <rect x="430" y="255" width="8" height="10"/>
    </g>

    <!-- Soccer ball -->
    <g transform="translate(256 360)">
      <ellipse cx="0" cy="78" rx="64" ry="10" fill="#000" opacity="0.35"/>
      <circle r="76" fill="#FFFFFF" stroke="#0F1226" stroke-width="8"/>
      <!-- Pentagons -->
      <polygon points="0,-40 38,-12 24,32 -24,32 -38,-12" fill="#0F1226"/>
      <polygon points="-58,-8 -42,-44 -70,-20" fill="#0F1226"/>
      <polygon points="58,-8 42,-44 70,-20" fill="#0F1226"/>
      <polygon points="-44,46 -10,52 -28,72" fill="#0F1226"/>
      <polygon points="44,46 10,52 28,72" fill="#0F1226"/>
    </g>

    <!-- Motion lines -->
    <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <line x1="180" y1="350" x2="150" y2="345"/>
      <line x1="175" y1="380" x2="135" y2="378"/>
      <line x1="182" y1="410" x2="148" y2="415"/>
    </g>

    <!-- Grain overlay -->
    <rect width="512" height="512" fill="url(#grain)"/>
  </g>
</svg>
